<!DOCTYPE html>
<html>
<head>
  <title>Shop Now</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background-color: #f5f5f5;
    }

    /* Header */
    .header {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    /* Product container */
    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
    }

    /* Product card */
    .product {
      background-color: white;
      width: 200px;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
    }

    .product h3 {
      margin: 10px 0 5px 0;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button {
      background-color: blue;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: darkblue;
    }

  </style>
</head>

<body>

  <div class="header">
    Shop Now
  </div>

  <div class="container">

    <div class="product">
      <img src="tshirt.png" alt="Product 1">
      <h3>T-Shirt</h3>
      <p class="price">500 PKR</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="Book.jpg" alt="Product 2">
      <h3>Book</h3>
      <p class="price">300 PKR</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="shoes.jpg" alt="Product 3">
      <h3>Shoes</h3>
      <p class="price">1500 PKR</p>
      <button>Add to Cart</button>
    </div>
    
    <div class="product">
      <img src="frocks.jpg" alt="Product 3">
      <h3>full dress</h3>
      <p class="price">2000PKR</p>
      <button>Add to Cart</button>
    </div>

  </div>

</body>
</html>
